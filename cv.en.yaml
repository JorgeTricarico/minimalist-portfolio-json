design:
  theme: classic
  page:
    size: a4
    top_margin: 1.5cm
    bottom_margin: 1.5cm
    left_margin: 1.5cm
    right_margin: 1.5cm
    show_footer: false
    show_top_note: false
  colors:
    name: rgb(0, 79, 144)
  typography:
    font_size:
      body: 9.5pt
      name: 24pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.2em
    small_caps:
      section_titles: true
  header:
    space_below_name: 0.4cm
    space_below_headline: 0.4cm
    space_below_connections: 0.5cm
  section_titles:
    space_above: 0.5cm
    space_below: 0.3cm
  sections:
    space_between_regular_entries: 1em
    space_between_text_based_entries: 0.5em
    show_time_spans_in:
      - Experience
  entries:
    degree_width: 0cm
    date_and_location_width: 3.8cm
  templates:
    education_entry:
      main_column: |-
        **INSTITUTION**
        *DEGREE* in AREA
        HIGHLIGHTS
      degree_column: ''

settings:
  bold_keywords: []

locale:
  language: english