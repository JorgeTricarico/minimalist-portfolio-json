design:
  theme: classic
  page:
    size: a4
    top_margin: 1.5cm
    bottom_margin: 1.5cm
    left_margin: 1.5cm
    right_margin: 1.5cm
    show_footer: false
    show_top_note: false
  colors:
    name: rgb(0, 79, 144)
  typography:
    font_size:
      body: 9.5pt
      name: 24pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.2em
