          - "Construcción de frameworks de automatización E2E robustos utilizando Playwright y TypeScript para validar la lógica de negocio en servicios críticos (APIs, Web, Mobile)."
          - "Gestión técnica del ciclo de pruebas y análisis forense de traces/logs, colaborando estrechamente con desarrolladores mediante la optimización de consultas SQL/NoSQL."

