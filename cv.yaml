cv:
  name: "Jorge Tricarico"
  headline: "AI-Driven QA Engineer"
  photo: "public/perfil_rounded.png"
  location: "Buenos Aires, AR"
  email: "jorge.tricarico@gmail.com"
  phone: "+54 9 11 50479769"
  social_networks:
    - network: LinkedIn
      username: jorge-tricarico
    - network: GitHub
      username: JorgeTricarico
      
  sections:
    Resumen:
      - "Ingeniero QA y Especialista en IA enfocado en la creación de producto y la confiabilidad del software. Cuento con un perfil técnico full-stack que potencio mediante el uso avanzado de LLMs y herramientas agenticas. Me especializo en liderar la automatización en entornos dinámicos, compensando limitaciones de recursos mediante arquitecturas innovadoras y optimizando la entrega de valor con total autonomía técnica."

    Experiencia:
      - company: "OneVisa - Dubai (UAE) / España"
        position: "(Part-time) Senior Principal QA Engineer (AI & Reliability)"
        start_date: "2026-02"
        end_date: "present"
        highlights:
          - "Único responsable de QA en una startup en fase de alto crecimiento, liderando el diseño y la ejecución de la estrategia integral de automatización desde cero."
          - "Escalabilidad de la cobertura de pruebas sin ampliar la plantilla, compensando la falta de recursos humanos mediante la creación y orquestación de agentes de IA con Claude Code."
          - "Implementación de sistemas de autodiagnóstico iterativos en los pipelines, reduciendo los tiempos de debugging y permitiendo una integración técnica profunda con el equipo de ingeniería."

      - company: "Tata Consultancy Service - Banco Galicia"
        position: "Analista QA Manual - Automation"
        start_date: "2023-04"
        end_date: "present"
        highlights:
          - "Diseño y desarrollo de 'CobroTron', un agente de IA propio integrado en VSC Github Copilot, especializado en acelerar fuertemente la generación de scripts de automatización para flujos web utilizando Playwright y Python."
          - "Construcción de 'FullTron', la máxima evolución de agente QA con autodiagnóstico pionero para iterar tests de forma autónoma. Genera frameworks completos (POM) E2E para Apps nativas/React (Appium + BrowserStack), APIs y Web; subiendo métricas de Pass/Fail y evidencia de forma automática al sistema ALM."
          - "Gestión técnica ágil del ciclo de pruebas y análisis de traces/logs, colaborando cercanamente con desarrolladores mediante la optimización de infraestructura y queries (SQL/NoSQL)."

      - company: "Ada School - Colombia"
        position: "Profesor Python (BootCamp Data y FullStack)"
        start_date: "2023-09"
        end_date: "2024-10"
        highlights:
          - "Mentoría técnica avanzada en Python enfocada en la calidad del código, arquitectura de software y mejores prácticas de desarrollo para perfiles internacionales."

    Educación:
      - institution: "Universidad Nacional de Hurlingham"
        area: "Inteligencia Artificial"
        degree: "Tec. Universitaria"
        start_date: "2024-01"
        end_date: "present"

      - institution: "Instituto Superior de Formación Docente N°109"
        area: "Economía y Gestión"
        degree: "Prof. de Educación Secundaria"
        start_date: "2019-03"
        end_date: "2023-12"
        highlights:
          - "Adeudo último año"

    Habilidades:
      - label: "IA & Agentes"
        details: "Claude Code, Gemini, DeepSeek, GitHub Copilot, Cursor, Antigravity, Engram, Prompt Engineering, OpenAI, Anthropic, Scikit-learn, Pandas, NumPy"
      - label: "Testing & QA"
        details: "Playwright, Cypress, Selenium, Appium, Pytest, k6 (Performance), Postman, Bruno"
      - label: "Dev & Ops"
        details: "Python, TypeScript, JavaScript, Java, Node.js, FastAPI, Flask, AWS, Docker, Jenkins, Linux, Bash, CI/CD"
      - label: "Observabilidad & Data"
        details: "Grafana, Kibana, SQL, NoSQL, Matplotlib, Seaborn, Análisis de Traces/Logs, GitHub Actions"
      - label: "Idiomas"
        details: "Español, Inglés"

    Proyectos:
      - name: "Zenco.arg (En Prod)"
        isActive: true
        description: "Plataforma de modernización para emprendimientos de diseño y arreglos de ropa. Incluye un Dashboard Web premium para gestión de órdenes y un Bot de WhatsApp con IA (Gemini) que atiende clientes y consulta estados de pedidos de forma autónoma."
        highlights: ["React 18", "Node.js", "AI WhatsApp Bot", "Gemini AI"]
        url: "https://github.com/JorgeTricarico/platform"
        github: "https://github.com/JorgeTricarico/platform"
        imageLight: "/zenko_light.png"
        imageDark: "/zenko_dark.png"
      - name: "El Industrial (En Prod)"
        isActive: true
        description: "Sistema de automatización de precios para suministros industriales. Gestiona telemetría de alta frecuencia desde la API de Bertual, aplica protección de márgenes y genera reportes ejecutivos diarios con IA enviados por Telegram."
        highlights: ["Python", "Vanilla JS", "API REST", "Telegram Bot", "IA Reporting"]
        url: "https://github.com/JorgeTricarico/El-Industrial"
        github: "https://github.com/JorgeTricarico/El-Industrial"
        imageLight: "/industrial_light.png"
        imageDark: "/industrial_dark.png"
      - name: "Portfolio CV (Live)"
        isActive: true
        description: "Versión altamente personalizada y mejorada del fork original. Integra la tecnología de RenderCV para la generación de PDFs optimizados para sistemas ATS. Implementé un sistema multi-idioma (i18n), modo oscuro avanzado con detección automática, paleta de comandos interactiva (Ctrl+K) y una interfaz premium con efectos ambient-blur."
        highlights: ["JSON Resume", "Astro", "RenderCV (ATS Friendly)", "i18n", "Advanced Dark Mode"]
        url: "https://github.com/JorgeTricarico/minimalist-portfolio-json"
        github: "https://github.com/JorgeTricarico/minimalist-portfolio-json"

design:
  theme: classic
  page:
    size: a4
    top_margin: 1.5cm
    bottom_margin: 1.5cm
    left_margin: 1.5cm
    right_margin: 1.5cm
    show_footer: false
    show_top_note: false
  colors:
    name: rgb(0, 79, 144)
  typography:
    font_size:
      body: 9.5pt
      name: 24pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.2em
    small_caps:
      section_titles: true
  header:
    space_below_name: 0.4cm
    space_below_headline: 0.4cm
    space_below_connections: 0.5cm
  section_titles:
    space_above: 0.5cm
    space_below: 0.3cm
  sections:
    space_between_regular_entries: 1em
    space_between_text_based_entries: 0.5em
    show_time_spans_in:
      - Experiencia
  entries:
    degree_width: 0cm
    date_and_location_width: 3.8cm
  templates:
    education_entry:
      main_column: |-
        **INSTITUTION**
        *DEGREE* en AREA
        HIGHLIGHTS
      degree_column: ''

settings:
  bold_keywords: []

locale:
  language: spanish